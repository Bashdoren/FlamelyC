<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FLAMELY | Про Лига</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --flame:#ff4500;--flame2:#ff7a00;
  --prime:#8b5cf6;--prime2:#a78bfa;
  --green:#10b981;
  --dark:#07070a;--card:#0e0e12;--card2:#141418;
  --border:rgba(255,255,255,0.07);
  --border-flame:rgba(255,69,0,0.35);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);color:#e5e7eb;font-family:'Space Grotesk',sans-serif;overflow-x:hidden;min-height:100vh;}
.font-display{font-family:'Bebas Neue',sans-serif;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 15% 10%,rgba(255,69,0,0.09) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 85% 85%,rgba(139,92,246,0.07) 0%,transparent 55%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.03) 0%,transparent 50%);pointer-events:none;}
.card-flame{border-color:var(--border-flame);}
.card-prime{border-color:rgba(139,92,246,0.35);background:linear-gradient(135deg,#0e0e12,#0f0c1a);}
.btn-flame{background:linear-gradient(135deg,#ff4500,#ff7a00);border:none;color:#fff;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;cursor:pointer;transition:all 0.2s;box-shadow:0 0 30px rgba(255,69,0,0.35),inset 0 1px 0 rgba(255,255,255,0.15);}
.btn-flame:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(255,69,0,0.55);}
.btn-flame:active{transform:scale(0.97);}
.btn-ghost{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:#9ca3af;cursor:pointer;transition:all 0.2s;}
.btn-ghost:hover{background:rgba(255,255,255,0.09);color:#e5e7eb;}
.btn-tg{background:linear-gradient(135deg,#0088cc,#00b4d8);border:none;color:#fff;cursor:pointer;transition:all 0.2s;box-shadow:0 0 20px rgba(0,136,204,0.35);}
.btn-tg:hover{transform:translateY(-1px);box-shadow:0 6px 30px rgba(0,136,204,0.6);}
.btn-red{background:linear-gradient(135deg,#dc2626,#ef4444);border:none;color:#fff;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;cursor:pointer;transition:all 0.2s;}
.btn-red:hover{transform:translateY(-1px);}
.btn-prime{background:linear-gradient(135deg,#7c3aed,#a78bfa);border:none;color:#fff;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;cursor:pointer;transition:all 0.2s;box-shadow:0 0 20px rgba(139,92,246,0.35);}
.btn-prime:hover{transform:translateY(-1px);box-shadow:0 6px 30px rgba(139,92,246,0.6);}
.nav-bar{height:60px;background:rgba(7,7,10,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:50;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#fff;line-height:1;cursor:pointer;user-select:none;-webkit-user-select:none;}
.logo span{color:var(--flame);}
.tab-bar{background:rgba(7,7,10,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;gap:2px;padding:10px 12px;overflow-x:auto;position:sticky;top:60px;z-index:40;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-btn{padding:7px 14px;border-radius:10px;font-size:11px;font-weight:600;color:#4b5563;cursor:pointer;white-space:nowrap;transition:all 0.2s;background:transparent;border:none;}
.tab-btn.active{background:rgba(255,69,0,0.15);color:var(--flame);border:1px solid rgba(255,69,0,0.25);}
.tab-btn:hover:not(.active){color:#9ca3af;background:rgba(255,255,255,0.04);}
.badge-prime{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:1px;}
.badge-free{background:rgba(255,255,255,0.07);border:1px solid var(--border);color:#6b7280;font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;}
.dot-online{width:8px;height:8px;border-radius:50%;background:#10b981;box-shadow:0 0 8px rgba(16,185,129,0.8);display:inline-block;flex-shrink:0;}
.dot-ingame{width:8px;height:8px;border-radius:50%;background:var(--flame);box-shadow:0 0 8px rgba(255,69,0,0.8);display:inline-block;flex-shrink:0;}
.dot-offline{width:8px;height:8px;border-radius:50%;background:#374151;display:inline-block;flex-shrink:0;}
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#4b5563;}
.stat-card{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center;}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;}
.stat-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#4b5563;margin-top:4px;}
.input-field{width:100%;background:rgba(0,0,0,0.5);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:#e5e7eb;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;outline:none;transition:border-color 0.2s;}
.input-field:focus{border-color:var(--flame);}
.input-field::placeholder{color:#374151;}
.lobby-row{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;transition:border-color 0.2s;}
.lobby-row:hover{border-color:rgba(255,69,0,0.25);}
.result-win{border-left:3px solid var(--green);}
.result-loss{border-left:3px solid #ef4444;}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a1a1f;border:1px solid rgba(255,69,0,0.4);color:#fff;padding:10px 22px;border-radius:100px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.25s,transform 0.25s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);backdrop-filter:blur(16px);z-index:9000;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.modal-bg.open{display:flex;}
@keyframes modalIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
.modal-inner{animation:modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;width:100%;max-width:360px;margin:auto;}
/* AVATAR FIX: always cover, never distort */
.avatar-xl{width:72px;height:72px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:30px;border:2px solid var(--border-flame);overflow:hidden;flex-shrink:0;background:var(--card2);}
.avatar-xl img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;}
.nav-avatar{width:36px;height:36px;border-radius:10px;background:var(--card2);border:1.5px solid rgba(255,69,0,0.4);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;cursor:pointer;overflow:hidden;}
.nav-avatar img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;}
.av-circle{width:44px;height:44px;border-radius:12px;overflow:hidden;background:var(--card2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.av-circle img{width:100%;height:100%;object-fit:cover;object-position:center;}
.av-lg{width:80px;height:80px;border-radius:18px;border:2px solid rgba(255,69,0,0.4);display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;position:relative;flex-shrink:0;background:var(--card2);}
.av-lg img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;}
/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:320px;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.chat-messages{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px;}
.chat-msg{font-size:11px;line-height:1.5;}
.chat-msg .sender{font-weight:700;color:var(--flame);}
.chat-msg .sender.me{color:var(--prime2);}
.chat-msg .sender.support{color:#10b981;}
.chat-msg .text{color:#9ca3af;}
.chat-msg .ts{color:#374151;font-size:9px;margin-left:4px;}
.chat-input-wrap{display:flex;border-top:1px solid var(--border);}
.chat-input{flex:1;background:transparent;border:none;outline:none;padding:10px 12px;color:#e5e7eb;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:500;}
.chat-input::placeholder{color:#374151;}
.chat-send-btn{padding:8px 14px;background:rgba(255,69,0,0.12);border:none;color:var(--flame);cursor:pointer;font-size:14px;transition:background 0.2s;}
.chat-send-btn:hover{background:rgba(255,69,0,0.22);}
/* PUSH NOTIF */
#push-notif{position:fixed;top:72px;right:16px;z-index:9500;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.push-item{background:#0e0e12;border:1px solid rgba(255,69,0,0.4);border-radius:14px;padding:12px 16px;min-width:260px;max-width:300px;display:flex;gap:10px;align-items:flex-start;pointer-events:all;cursor:pointer;transition:transform 0.2s;}
.push-item:hover{transform:scale(1.02);}
@keyframes pushIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes pushOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)}}
.push-item{animation:pushIn 0.3s ease forwards;}
.push-item.out{animation:pushOut 0.3s ease forwards;}
/* ADMIN */
.admin-badge{background:linear-gradient(135deg,#dc2626,#f97316);color:#fff;font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:1px;}
/* FRIEND REQUEST */
.friend-req-badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:#ef4444;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--dark);}
/* NOTIFICATION DOT */
.tab-notif{position:relative;}
.tab-notif-dot{position:absolute;top:-2px;right:-6px;width:7px;height:7px;background:#ef4444;border-radius:50%;border:1.5px solid var(--dark);}
/* REPORT STATUS */
.report-open{color:#f59e0b;font-size:9px;font-weight:700;}
.report-closed{color:#10b981;font-size:9px;font-weight:700;}
/* SCROLLBAR */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,69,0,0.4);border-radius:2px;}
/* FRIEND CHAT BUBBLES */
.bubble-me{background:rgba(255,69,0,0.15);border:1px solid rgba(255,69,0,0.25);border-radius:12px 12px 4px 12px;padding:8px 12px;align-self:flex-end;max-width:80%;}
.bubble-them{background:var(--card2);border:1px solid var(--border);border-radius:12px 12px 12px 4px;padding:8px 12px;align-self:flex-start;max-width:80%;}
.bubble-text{font-size:12px;color:#e5e7eb;}
.bubble-time{font-size:9px;color:#4b5563;margin-top:3px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.page{animation:fadeUp 0.35s ease forwards;}
@keyframes logoGlow{0%,100%{text-shadow:none}50%{text-shadow:0 0 20px #ff4500,0 0 40px #ff4500}}
.logo-glowing{animation:logoGlow 0.5s ease infinite;}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px;}
.confirm-box{background:#141418;border:1px solid rgba(239,68,68,0.4);border-radius:18px;padding:24px;max-width:320px;width:100%;text-align:center;}
/* LOBBY ROOM CARD */
.room-card{background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px;transition:border-color 0.2s;}
.room-card:hover{border-color:rgba(255,69,0,0.3);}
.slot-filled{width:40px;height:40px;border-radius:10px;overflow:hidden;background:rgba(255,69,0,0.1);border:1px solid rgba(255,69,0,0.3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.slot-filled img{width:100%;height:100%;object-fit:cover;object-position:center;}
.slot-empty{width:40px;height:40px;border-radius:10px;border:1.5px dashed rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:16px;color:#374151;flex-shrink:0;}
/* TOP-100 */
.top-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card2);border:1px solid var(--border);border-radius:12px;margin-bottom:6px;transition:border-color 0.2s;}
.top-row:hover{border-color:rgba(255,69,0,0.2);}
.top-rank{font-family:'Bebas Neue',sans-serif;font-size:20px;width:28px;text-align:center;flex-shrink:0;}
/* MODE SELECTOR */
.mode-btn{padding:10px 16px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;border:1px solid var(--border);background:transparent;color:#4b5563;}
.mode-btn.active{background:rgba(255,69,0,0.15);color:var(--flame);border-color:rgba(255,69,0,0.4);}
/* LOBBY CHAT */
.lobby-chat-wrap{height:220px;display:flex;flex-direction:column;background:rgba(0,0,0,0.35);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.lobby-chat-msgs{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:4px;}
.lobby-chat-msg{font-size:11px;line-height:1.5;}
.lobby-chat-msg .lc-name{font-weight:700;color:var(--flame);}
.lobby-chat-msg .lc-name.lc-me{color:var(--prime2);}
.lobby-chat-msg .lc-text{color:#9ca3af;}
.lobby-chat-msg .lc-time{color:#374151;font-size:9px;margin-left:4px;}
</style>
</head>
<body>

<div id="toast"></div>
<div id="push-notif"></div>

<!-- NAV -->
<div class="nav-bar">
  <div class="logo" id="logo-btn">FLAME<span>LY</span></div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div id="online-count" style="font-size:10px;font-weight:700;color:#10b981;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);padding:4px 10px;border-radius:20px;"></div>
    <div id="notif-bell" onclick="openTab('friends')" style="position:relative;cursor:pointer;font-size:18px;color:#4b5563;">🔔<span id="notif-count" style="display:none;position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:#ef4444;border-radius:50%;font-size:9px;font-weight:700;align-items:center;justify-content:center;border:2px solid var(--dark);"></span></div>
    <div class="nav-avatar" id="nav-av" onclick="openTab('profile')">🔥</div>
  </div>
</div>

<!-- TABS -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="openTab('home')" id="tab-home">🏠 ГЛАВНАЯ</button>
  <button class="tab-btn tab-notif" onclick="openTab('friends')" id="tab-friends">👥 ДРУЗЬЯ<span class="tab-notif-dot" id="friends-dot" style="display:none;"></span></button>
  <button class="tab-btn" onclick="openTab('lobby')" id="tab-lobby">⚔️ ЛОББИ</button>
  <button class="tab-btn" onclick="openTab('top')" id="tab-top">🏆 ТОП 100</button>
  <button class="tab-btn" onclick="openTab('elo')" id="tab-elo">📊 ELO</button>
  <button class="tab-btn" onclick="openTab('support')" id="tab-support">💬 ПОДДЕРЖКА</button>
  <button class="tab-btn" onclick="openTab('profile')" id="tab-profile">👤 ПРОФИЛЬ</button>
</div>

<!-- MAIN CONTENT -->
<div id="app-content" style="position:relative;z-index:1;padding:16px;max-width:480px;margin:0 auto;padding-bottom:40px;"></div>

<!-- MODALS -->

<!-- REPORT -->
<div id="report-modal" class="modal-bg">
  <div class="modal-inner">
    <div class="card card-flame" style="padding:24px 20px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <div class="font-display" style="font-size:28px;letter-spacing:2px;">⚠️ РЕПОРТ</div>
        <button onclick="closeModal('report-modal')" class="btn-ghost" style="border-radius:10px;padding:6px 12px;font-size:12px;">✕</button>
      </div>
      <div id="report-target-info" style="margin-bottom:16px;"></div>
      <div style="margin-bottom:12px;">
        <div class="section-label" style="margin-bottom:8px;">ПРИЧИНА</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card2);"><input type="radio" name="report-reason" value="Читерство/Хаки" style="accent-color:var(--flame);"> <span style="font-size:12px;font-weight:600;">🎯 Читерство / Хаки</span></label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card2);"><input type="radio" name="report-reason" value="Токсичное поведение"> <span style="font-size:12px;font-weight:600;">🤬 Токсичное поведение</span></label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card2);"><input type="radio" name="report-reason" value="Намеренный слив"> <span style="font-size:12px;font-weight:600;">💀 Намеренный слив</span></label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card2);"><input type="radio" name="report-reason" value="AFK / Не играет"> <span style="font-size:12px;font-weight:600;">😴 AFK / Не играет</span></label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card2);"><input type="radio" name="report-reason" value="Другое"> <span style="font-size:12px;font-weight:600;">📝 Другое</span></label>
        </div>
      </div>
      <div style="margin-bottom:16px;">
        <div class="section-label" style="margin-bottom:8px;">КОММЕНТАРИЙ</div>
        <textarea id="report-comment" class="input-field" placeholder="Опишите ситуацию..." rows="3" style="resize:none;"></textarea>
      </div>
      <button onclick="submitReport()" class="btn-red font-display" style="width:100%;padding:14px;border-radius:14px;font-size:18px;">ОТПРАВИТЬ РЕПОРТ</button>
    </div>
  </div>
</div>

<!-- FRIEND CHAT -->
<div id="friend-chat-modal" class="modal-bg">
  <div class="modal-inner">
    <div class="card card-flame" style="padding:20px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
        <div id="fc-avatar" class="av-circle"></div>
        <div style="flex:1;">
          <div id="fc-name" style="font-weight:700;font-size:14px;"></div>
          <div id="fc-status" style="font-size:11px;color:#4b5563;"></div>
        </div>
        <button onclick="closeModal('friend-chat-modal');clearInterval(window._chatPoll);" class="btn-ghost" style="border-radius:10px;padding:6px 12px;font-size:12px;">✕</button>
      </div>
      <div class="chat-wrap" style="height:280px;">
        <div class="chat-messages" id="fc-messages" style="display:flex;flex-direction:column;gap:8px;"></div>
        <div class="chat-input-wrap">
          <input class="chat-input" id="fc-input" placeholder="Сообщение..." onkeydown="if(event.key==='Enter')sendFriendMsg()">
          <button class="chat-send-btn" onclick="sendFriendMsg()">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ADD FRIEND -->
<div id="add-friend-modal" class="modal-bg">
  <div class="modal-inner">
    <div class="card card-flame" style="padding:24px 20px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <div class="font-display" style="font-size:28px;letter-spacing:2px;">👥 ДОБАВИТЬ ДРУГА</div>
        <button onclick="closeModal('add-friend-modal')" class="btn-ghost" style="border-radius:10px;padding:6px 12px;font-size:12px;">✕</button>
      </div>
      <input class="input-field" id="friend-search-input" placeholder="Введите никнейм или ID..." style="margin-bottom:12px;" oninput="searchFriends()">
      <div id="friend-search-results" style="display:flex;flex-direction:column;gap:8px;min-height:40px;">
        <div style="text-align:center;color:#4b5563;font-size:12px;padding:20px;">Начните вводить ник для поиска</div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const STATE = {
  currentTab: 'home',
  user: {
    id: '',
    name: 'ProPlayer',
    emoji: '🔥',
    isPrime: false,
    elo: 1450,
    wins: 47,
    losses: 23,
    kd: 2.1,
    avatar: null,
    verified: false
  },
  isAdmin: false,
  registeredUsers: [],
  friends: [],
  friendRequests: [],
  sentRequests: [],
  declinedRequests: [],
  friendChats: {},
  currentFriendChat: null,
  reports: [],
  supportTickets: [],
  currentTicket: null,
  pushEnabled: false,
  bannedUsers: [],
  isLogged: false,
  // Lobby state
  lobbyMode: 2,
  currentRoom: null,
};

// ============================================================
// ID GENERATOR — ГАРАНТИРОВАННО УНИКАЛЬНЫЙ
// ============================================================
function generateUniqueId(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const existingUsers = getGlobalUsers();
  const existingIds = new Set(existingUsers.map(u=>u.id));
  let id;
  do {
    id='#F';
    for(let i=0;i<5;i++) id+=chars[Math.floor(Math.random()*chars.length)];
  } while(existingIds.has(id));
  return id;
}

// ============================================================
// CUSTOM CONFIRM
// ============================================================
function showConfirm(text, onOk){
  const overlay = document.getElementById('confirm-overlay');
  document.getElementById('confirm-text').textContent = text;
  overlay.style.display = 'flex';
  const okBtn = document.getElementById('confirm-ok-btn');
  const cancelBtn = document.getElementById('confirm-cancel-btn');
  const newOk = okBtn.cloneNode(true);
  const newCancel = cancelBtn.cloneNode(true);
  okBtn.parentNode.replaceChild(newOk, okBtn);
  cancelBtn.parentNode.replaceChild(newCancel, cancelBtn);
  newOk.addEventListener('click', ()=>{ overlay.style.display='none'; onOk(); });
  newCancel.addEventListener('click', ()=>{ overlay.style.display='none'; });
}

// ============================================================
// UTILS
// ============================================================
function toast(msg, dur=2500){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
}

function nowTime(){
  const d=new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

function getUserById(id){
  if(id===STATE.user.id) return STATE.user;
  syncRegisteredUsers();
  return STATE.registeredUsers.find(u=>u.id===id);
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

// ============================================================
// AVATAR HELPER — всегда правильно обрезает фото
// ============================================================
function avatarHtml(user, size=40, radius=10){
  if(user && user.avatar){
    return `<img src="${user.avatar}" style="width:${size}px;height:${size}px;border-radius:${radius}px;object-fit:cover;object-position:center;display:block;">`;
  }
  return `<span style="font-size:${Math.round(size*0.45)}px;">${(user&&user.emoji)||'👤'}</span>`;
}

// ============================================================
// PUSH NOTIFICATIONS
// ============================================================
function pushNotif(emoji, title, body, onClick){
  const wrap=document.getElementById('push-notif');
  const item=document.createElement('div');
  item.className='push-item';
  item.innerHTML=`<div style="font-size:24px;flex-shrink:0;">${emoji}</div><div><div style="font-size:12px;font-weight:700;color:#fff;margin-bottom:2px;">${title}</div><div style="font-size:11px;color:#9ca3af;">${body}</div></div>`;
  if(onClick) item.onclick=onClick;
  wrap.appendChild(item);
  setTimeout(()=>{ item.classList.add('out'); setTimeout(()=>item.remove(),300); },4000);
}

function requestPushPermission(){
  if('Notification' in window){
    Notification.requestPermission().then(p=>{
      STATE.pushEnabled=(p==='granted');
      if(STATE.pushEnabled) toast('✅ Пуш-уведомления включены');
      else toast('❌ Используем встроенные уведомления');
    });
  }
}

function sendPush(emoji,title,body,onClick){
  pushNotif(emoji,title,body,onClick);
  if(STATE.pushEnabled && Notification.permission==='granted'){
    new Notification(`${emoji} ${title}`,{body});
  }
}

// ============================================================
// LOGO LONG PRESS → ADMIN
// ============================================================
let logoTimer=null;
const logoBtn=document.getElementById('logo-btn');
logoBtn.addEventListener('mousedown',()=>{ logoBtn.classList.add('logo-glowing'); logoTimer=setTimeout(()=>{openAdminPanel();logoBtn.classList.remove('logo-glowing');},2000); });
logoBtn.addEventListener('mouseup',()=>{clearTimeout(logoTimer);logoBtn.classList.remove('logo-glowing');});
logoBtn.addEventListener('mouseleave',()=>{clearTimeout(logoTimer);logoBtn.classList.remove('logo-glowing');});
logoBtn.addEventListener('touchstart',()=>{ logoBtn.classList.add('logo-glowing'); logoTimer=setTimeout(()=>{openAdminPanel();logoBtn.classList.remove('logo-glowing');},2000); },{passive:true});
logoBtn.addEventListener('touchend',()=>{clearTimeout(logoTimer);logoBtn.classList.remove('logo-glowing');});

function openAdminPanel(){
  STATE.isAdmin=true;
  switchAdminTab('tools');
  openModal('admin-modal');
  toast('🔓 Режим администратора активирован');
}

// ============================================================
// ADMIN TAB SWITCHING
// ============================================================
function switchAdminTab(tab){
  document.getElementById('admin-section-tools').style.display='none';
  document.getElementById('admin-section-reports').style.display='none';
  document.getElementById('admin-section-tickets').style.display='none';
  ['tools','reports','tickets'].forEach(t=>{
    const btn=document.getElementById('admin-tab-'+t);
    if(btn){btn.style.background='transparent';btn.style.color='#4b5563';btn.style.border='none';}
  });
  const colors={tools:'rgba(220,38,38,0.15)',reports:'rgba(245,158,11,0.15)',tickets:'rgba(16,185,129,0.15)'};
  const textColors={tools:'#ef4444',reports:'#f59e0b',tickets:'#10b981'};
  const borderColors={tools:'rgba(220,38,38,0.25)',reports:'rgba(245,158,11,0.25)',tickets:'rgba(16,185,129,0.25)'};
  const sec=document.getElementById('admin-section-'+tab);
  const btn=document.getElementById('admin-tab-'+tab);
  if(sec){sec.style.display=tab==='tools'?'block':'flex';if(tab!=='tools')sec.style.flexDirection='column';}
  if(btn){btn.style.background=colors[tab];btn.style.color=textColors[tab];btn.style.border=`1px solid ${borderColors[tab]}`;}
  if(tab==='reports') renderAdminReports();
  if(tab==='tickets') renderAdminTickets();
  if(tab==='tools')   renderBannedList();
}

// ============================================================
// ADMIN ACTIONS
// ============================================================
function adminGiveEloById(){
  const id=document.getElementById('elo-id-input').value.trim();
  const val=parseInt(document.getElementById('elo-amount-input').value);
  if(!id){toast('❌ Введите ID');return;}
  if(isNaN(val)||val<=0){toast('❌ Введите корректное ELO');return;}
  if(id===STATE.user.id){STATE.user.elo+=val;toast(`⚡ +${val} ELO выдано вам`);renderPage();}
  else{
    const list=getGlobalUsers();const u=list.find(x=>x.id===id);
    if(u){u.elo+=val;saveGlobalUsers(list);toast(`⚡ +${val} ELO выдано ${u.name}`);}
    else toast('❌ Пользователь не найден');
  }
  document.getElementById('elo-id-input').value='';
  document.getElementById('elo-amount-input').value='';
}

function adminTakeEloById(){
  const id=document.getElementById('elo-id-input').value.trim();
  const val=parseInt(document.getElementById('elo-amount-input').value);
  if(!id){toast('❌ Введите ID');return;}
  if(isNaN(val)||val<=0){toast('❌ Введите корректное ELO');return;}
  if(id===STATE.user.id){STATE.user.elo=Math.max(0,STATE.user.elo-val);toast(`⚡ -${val} ELO снято`);renderPage();}
  else{
    const list=getGlobalUsers();const u=list.find(x=>x.id===id);
    if(u){u.elo=Math.max(0,u.elo-val);saveGlobalUsers(list);toast(`⚡ -${val} ELO снято с ${u.name}`);}
    else toast('❌ Пользователь не найден');
  }
  document.getElementById('elo-id-input').value='';
  document.getElementById('elo-amount-input').value='';
}

function adminGivePrime(){
  const id=document.getElementById('prime-id-input').value.trim();
  const dur=document.getElementById('prime-duration').value;
  if(!id){toast('❌ Введите ID');return;}
  const durLabel=dur==='9999'?'навсегда':dur+' дней';
  if(id===STATE.user.id){STATE.user.isPrime=true;toast(`💎 Prime выдан на ${durLabel}`);renderPage();}
  else{
    const list=getGlobalUsers();const u=list.find(x=>x.id===id);
    if(u){u.isPrime=true;saveGlobalUsers(list);toast(`✅ Prime выдан ${u.name} на ${durLabel}`);}
    else toast('❌ Пользователь не найден');
  }
  document.getElementById('prime-id-input').value='';
}

function adminVerify(){
  const id=document.getElementById('verify-id-input').value.trim();
  if(!id){toast('❌ Введите ID');return;}
  if(id===STATE.user.id){STATE.user.verified=true;toast('✅ Верификация выдана');renderPage();}
  else{
    const list=getGlobalUsers();const u=list.find(x=>x.id===id);
    if(u){u.verified=true;saveGlobalUsers(list);toast(`✅ Галочка выдана ${u.name}`);}
    else toast('❌ Пользователь не найден');
  }
  document.getElementById('verify-id-input').value='';
}

function adminUnverify(){
  const id=document.getElementById('verify-id-input').value.trim();
  if(!id){toast('❌ Введите ID');return;}
  if(id===STATE.user.id){STATE.user.verified=false;toast('✕ Верификация снята');renderPage();}
  else{
    const list=getGlobalUsers();const u=list.find(x=>x.id===id);
    if(u){u.verified=false;saveGlobalUsers(list);toast(`✕ Снято с ${u.name}`);}
    else toast('❌ Пользователь не найден');
  }
  document.getElementById('verify-id-input').value='';
}

function adminBan(){
  const id=document.getElementById('ban-id-input').value.trim();
  const reason=document.getElementById('ban-reason-input').value.trim();
  if(!id){toast('❌ Введите ID');return;}
  if(!STATE.bannedUsers.find(b=>b.id===id)) STATE.bannedUsers.push({id,reason:reason||'Нарушение правил',time:nowTime()});
  toast(`🔨 ${id} заблокирован`);
  document.getElementById('ban-id-input').value='';
  document.getElementById('ban-reason-input').value='';
  saveData();renderBannedList();
}

function adminUnban(){
  const id=document.getElementById('ban-id-input').value.trim();
  if(!id){toast('❌ Введите ID');return;}
  STATE.bannedUsers=STATE.bannedUsers.filter(b=>b.id!==id);
  toast(`✅ ${id} разблокирован`);
  document.getElementById('ban-id-input').value='';
  saveData();renderBannedList();
}

function unbanById(id){
  STATE.bannedUsers=STATE.bannedUsers.filter(b=>b.id!==id);
  toast(`✅ ${id} разблокирован`);
  saveData();renderBannedList();
}

function renderBannedList(){
  const wrap=document.getElementById('banned-list-wrap');
  const el=document.getElementById('banned-list');
  if(!el||!wrap)return;
  if(!STATE.bannedUsers.length){wrap.style.display='none';return;}
  wrap.style.display='block';
  el.innerHTML=STATE.bannedUsers.map(b=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:rgba(220,38,38,0.07);border:1px solid rgba(220,38,38,0.2);border-radius:8px;">
      <div><span style="font-size:12px;font-weight:700;color:#ef4444;">${b.id||b}</span>${b.reason?`<div style="font-size:10px;color:#4b5563;">${b.reason}</div>`:''}</div>
      <button onclick="unbanById('${b.id||b}')" style="font-size:10px;font-weight:700;color:#10b981;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:6px;padding:4px 8px;cursor:pointer;">РАЗБАН</button>
    </div>`).join('');
}

function renderAdminReports(){
  const el=document.getElementById('admin-reports-list');
  const cnt=document.getElementById('admin-reports-count');
  if(!el)return;
  const open=STATE.reports.filter(r=>!r.closed).length;
  if(cnt) cnt.textContent=`${open} открытых / ${STATE.reports.length} всего`;
  if(!STATE.reports.length){el.innerHTML='<div style="color:#4b5563;font-size:11px;text-align:center;padding:24px;">Жалоб пока нет</div>';return;}
  el.innerHTML=STATE.reports.map((r,i)=>`
    <div style="background:rgba(0,0,0,0.3);border-radius:12px;padding:12px;border:1px solid ${r.closed?'var(--border)':'rgba(245,158,11,0.2)'};">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <div><span style="font-size:12px;font-weight:700;color:#f59e0b;">⚠️ На: ${r.target}</span><span style="font-size:9px;color:#4b5563;margin-left:6px;">${r.time||''}</span></div>
        <span class="${r.closed?'report-closed':'report-open'}">${r.closed?'✓ ЗАКРЫТ':'● ОТКРЫТ'}</span>
      </div>
      <div style="font-size:11px;color:#9ca3af;margin-bottom:8px;">📌 ${r.reason}${r.comment?'<br><span style="color:#6b7280;">'+r.comment+'</span>':''}</div>
      ${!r.closed?`<div style="display:flex;gap:6px;">

// GLOBAL USERS (REAL ONLINE) — через localStorage общий для вкладок
// ============================================================
function getGlobalUsers(){try{return JSON.parse(localStorage.getItem('flamely_global_users')||'[]');}catch(e){return[];}}
function saveGlobalUsers(list){localStorage.setItem('flamely_global_users',JSON.stringify(list));}

function registerCurrentUser(){
  if(!STATE.user.id)return;
  const list=getGlobalUsers();
  const exists=list.find(u=>u.id===STATE.user.id);
  const me={
    id:STATE.user.id,name:STATE.user.name,emoji:STATE.user.emoji,
    isPrime:STATE.user.isPrime,verified:STATE.user.verified||false,
    elo:STATE.user.elo,wins:STATE.user.wins||0,losses:STATE.user.losses||0,
    avatar:STATE.user.avatar||null,
    status:'online',lastSeen:Date.now()
  };
  if(exists){Object.assign(exists,me);}else{list.push(me);}
  saveGlobalUsers(list);
}

function syncRegisteredUsers(){
  const list=getGlobalUsers().filter(u=>u.id!==STATE.user.id);
  list.forEach(u=>{u.status=u.lastSeen&&(Date.now()-u.lastSeen)<90000?'online':'offline';});
  STATE.registeredUsers=list;
}

function updateOnlineCount(){
  syncRegisteredUsers();
  const online=STATE.registeredUsers.filter(u=>u.status==='online').length+1;
  const el=document.getElementById('online-count');
  if(el) el.textContent=`● ${online} онлайн`;
}

function getIncomingRequests(){try{return JSON.parse(localStorage.getItem('flamely_req_'+STATE.user.id)||'[]');}catch(e){return[];}}
function addIncomingRequest(targetId,fromUser){const reqs=JSON.parse(localStorage.getItem('flamely_req_'+targetId)||'[]');if(!reqs.find(r=>r.id===fromUser.id))reqs.push(fromUser);localStorage.setItem('flamely_req_'+targetId,JSON.stringify(reqs));}
function removeIncomingRequest(fromId){const reqs=getIncomingRequests().filter(r=>r.id!==fromId);localStorage.setItem('flamely_req_'+STATE.user.id,JSON.stringify(reqs));}

function updateFriendsBadge(){
  syncRegisteredUsers();
  const incoming=getIncomingRequests();
  const newReqs=incoming.filter(r=>!STATE.friends.includes(r.id)&&!(STATE.declinedRequests||[]).includes(r.id));
  STATE.friendRequests=newReqs.map(r=>r.id);
  const cnt=STATE.friendRequests.length;
  const dot=document.getElementById('friends-dot');
  const bell=document.getElementById('notif-count');
  if(cnt>0){
    if(dot) dot.style.display='block';
    if(bell){bell.style.display='flex';bell.textContent=cnt;}
  } else {
    if(dot) dot.style.display='none';
    if(bell) bell.style.display='none';
  }
}

function sendFriendRequest(userId){
  if(STATE.friends.includes(userId)){toast('👥 Уже в друзьях');return;}
  if(STATE.sentRequests.includes(userId)){toast('⏳ Заявка уже отправлена');return;}
  STATE.sentRequests.push(userId);
  addIncomingRequest(userId,{id:STATE.user.id,name:STATE.user.name,emoji:STATE.user.emoji,elo:STATE.user.elo,isPrime:STATE.user.isPrime,avatar:STATE.user.avatar||null});
  const u=STATE.registeredUsers.find(r=>r.id===userId);
  toast(`✅ Заявка отправлена ${u?u.name:userId}`);
  closeModal('add-friend-modal');saveData();renderPage();
}

function acceptFriendRequest(userId){
  removeIncomingRequest(userId);
  STATE.friendRequests=STATE.friendRequests.filter(id=>id!==userId);
  if(!STATE.friends.includes(userId)) STATE.friends.push(userId);
  updateFriendsBadge();
  const u=STATE.registeredUsers.find(r=>r.id===userId)||{name:userId};
  toast(`🤝 ${u.name} добавлен в друзья!`);
  saveData();renderPage();
}

function declineFriendRequest(userId){
  removeIncomingRequest(userId);
  STATE.friendRequests=STATE.friendRequests.filter(id=>id!==userId);
  if(!STATE.declinedRequests) STATE.declinedRequests=[];
  STATE.declinedRequests.push(userId);
  updateFriendsBadge();
  toast('❌ Заявка отклонена');
  saveData();renderPage();
}

function removeFriend(userId){
  const u=getUserById(userId)||{name:userId};
  showConfirm(`Удалить ${u.name} из друзей?`, ()=>{
    STATE.friends=STATE.friends.filter(id=>id!==userId);
    toast('🗑️ Удалён из друзей');
    saveData();renderPage();
  });
}

  const results=STATE.registeredUsers.filter(u=>(u.name.toLowerCase().includes(q)||u.id.toLowerCase().includes(q))&&u.id!==STATE.user.id);

      <div style="flex:1;"><div style="font-weight:700;font-size:13px;">${u.name} ${u.isPrime?'<span class="badge-prime">PRIME</span>':''}</div>
      <div style="font-size:10px;color:#4b5563;">${u.id} · ELO ${u.elo} · <span style="color:${u.status==='online'?'#10b981':'#374151'}">${u.status==='online'?'Онлайн':'Офлайн'}</span></div></div>

// ============================================================
// LOBBY SYSTEM — РЕАЛЬНЫЕ КОМНАТЫ
// ============================================================
function getRooms(){try{return JSON.parse(localStorage.getItem('flamely_rooms')||'[]');}catch(e){return[];}}
function saveRooms(rooms){localStorage.setItem('flamely_rooms',JSON.stringify(rooms));}

function getLobbyChat(){try{return JSON.parse(localStorage.getItem('flamely_lobby_chat')||'[]');}catch(e){return[];}}
function saveLobbyChat(msgs){localStorage.setItem('flamely_lobby_chat',JSON.stringify(msgs.slice(-100)));}

function cleanOldRooms(){
  const rooms=getRooms().filter(r=>r.created&&(Date.now()-r.created)<1800000); // 30 min TTL
  saveRooms(rooms);
}

function createRoom(mode){
  cleanOldRooms();
  const rooms=getRooms();
  // Проверяем не состоит ли уже в комнате
  const existingRoom=rooms.find(r=>r.players.some(p=>p.id===STATE.user.id));
  if(existingRoom){
    toast('⚠️ Сначала покиньте текущую комнату');
    return;
  }
  const roomId='R'+Date.now().toString(36).toUpperCase();
  const newRoom={
    id:roomId,
    mode:mode,
    players:[{id:STATE.user.id,name:STATE.user.name,emoji:STATE.user.emoji,elo:STATE.user.elo,isPrime:STATE.user.isPrime,avatar:STATE.user.avatar||null}],
    created:Date.now(),
    status:'waiting'
  };
  rooms.push(newRoom);
  saveRooms(rooms);
  STATE.currentRoom=roomId;
  saveData();
  toast(`✅ Комната ${roomId} создана!`);
  renderPage();
}

function joinRoom(roomId){
  cleanOldRooms();
  const rooms=getRooms();
  // Покидаем старую комнату если есть
  const oldRoom=rooms.find(r=>r.players.some(p=>p.id===STATE.user.id));
  if(oldRoom&&oldRoom.id!==roomId){
    oldRoom.players=oldRoom.players.filter(p=>p.id!==STATE.user.id);
  }
  const room=rooms.find(r=>r.id===roomId);
  if(!room){toast('❌ Комната не найдена');return;}
  if(room.players.length>=room.mode){toast('❌ Комната заполнена');return;}
  if(room.status!=='waiting'){toast('❌ Игра уже началась');return;}
  if(!room.players.find(p=>p.id===STATE.user.id)){
    room.players.push({id:STATE.user.id,name:STATE.user.name,emoji:STATE.user.emoji,elo:STATE.user.elo,isPrime:STATE.user.isPrime,avatar:STATE.user.avatar||null});
  }
  saveRooms(rooms);
  STATE.currentRoom=roomId;
  saveData();
  toast(`✅ Вы вошли в комнату ${roomId}`);
  renderPage();
}

function leaveRoom(){
  if(!STATE.currentRoom)return;
  const rooms=getRooms();
  const room=rooms.find(r=>r.id===STATE.currentRoom);
  if(room){
    room.players=room.players.filter(p=>p.id!==STATE.user.id);
    if(room.players.length===0){
      const idx=rooms.indexOf(room);
      rooms.splice(idx,1);
    }
  }
  saveRooms(rooms);
  STATE.currentRoom=null;
  saveData();
  toast('👋 Вы покинули комнату');
  renderPage();
}

function sendLobbyChatMsg(){
  const input=document.getElementById('lobby-chat-input');
  if(!input)return;
  const text=input.value.trim();
  if(!text)return;
  const msgs=getLobbyChat();
  msgs.push({from:STATE.user.id,name:STATE.user.name,text,time:nowTime(),avatar:STATE.user.avatar||null,emoji:STATE.user.emoji});
  saveLobbyChat(msgs);
  input.value='';
  refreshLobbyChat();
}

function refreshLobbyChat(){
  const el=document.getElementById('lobby-chat-msgs');
  if(!el)return;
  const msgs=getLobbyChat();
  if(!msgs.length){el.innerHTML='<div style="text-align:center;color:#374151;font-size:11px;padding:16px;">Будьте первым кто напишет! 🔥</div>';return;}
  el.innerHTML=msgs.slice(-50).map(m=>`
    <div class="lobby-chat-msg">
      <span class="lc-name ${m.from===STATE.user.id?'lc-me':''}">${m.name}</span>
      <span class="lc-time">${m.time}</span><br>
      <span class="lc-text">${m.text}</span>
    </div>`).join('');
  el.scrollTop=el.scrollHeight;
}

function pollLobbyChat(){
  refreshLobbyChat();
  // Также обновляем список комнат если мы в них
  if(STATE.currentRoom){
    const rooms=getRooms();
    const room=rooms.find(r=>r.id===STATE.currentRoom);
    if(!room){STATE.currentRoom=null;saveData();}
    else{
      // Обновляем отображение слотов
      const slotsEl=document.getElementById('room-slots-'+STATE.currentRoom);
      if(slotsEl) renderRoomSlots(slotsEl,room);
    }
  }
}

function renderRoomSlots(container,room){
  let html='';
  for(let i=0;i<room.mode;i++){
    const p=room.players[i];
    if(p){
      html+=`<div class="slot-filled" title="${p.name}">${avatarHtml(p,40,10)}</div>`;
    } else {
      html+=`<div class="slot-empty">+</div>`;
    }
  }
  container.innerHTML=html;
}

  const content=document.getElementById('app-content');
  switch(STATE.currentTab){
    case 'home':    content.innerHTML=renderHome(); break;
    case 'friends': content.innerHTML=renderFriends(); break;
    case 'lobby':   content.innerHTML=renderLobby(); break;
    case 'top':     content.innerHTML=renderTop100(); break;
    case 'elo':     content.innerHTML=renderElo(); break;
    case 'support': content.innerHTML=renderSupport(); break;
    case 'profile': content.innerHTML=renderProfile(); break;
  }
  updateFriendsBadge();
  updateNavAvatar();
  updateOnlineCount();
  if(STATE.currentTab==='lobby'){
    setTimeout(()=>refreshLobbyChat(),100);
  }
}

        ${Array.from({length:myRoom.mode}).map((_,i)=>{
          const p=myRoom.players[i];
          if(p) return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
            <div class="slot-filled">${avatarHtml(p,40,10)}</div>

      ${myRoom.players.length>=myRoom.mode?`<button onclick="toast('🎮 Матч начат! Удачи!')" class="btn-flame font-display" style="width:100%;padding:12px;border-radius:12px;font-size:18px;">▶ НАЧАТЬ МАТЧ</button>`
      :`<div style="text-align:center;font-size:12px;color:#4b5563;padding:8px;">⏳ Ждём игроков (${myRoom.mode-myRoom.players.length} мест свободно)</div>`}
    </div>`;
  }

  // РЕЖИМЫ + СОЗДАТЬ КОМНАТУ
  if(!myRoom){
    html+=`<div style="margin-bottom:16px;">
      <div class="section-label" style="margin-bottom:10px;">РЕЖИМ ИГРЫ</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">
        ${[2,3,4,5].map(n=>`<button onclick="STATE.lobbyMode=${n};renderPage()" class="mode-btn ${STATE.lobbyMode===n?'active':''}" style="flex:1;min-width:52px;">
          ${n}v${n}<br><span style="font-size:9px;opacity:0.7;">${n} игр.</span>
        </button>`).join('')}

      <button onclick="createRoom(STATE.lobbyMode)" class="btn-flame font-display" style="width:100%;padding:14px;border-radius:14px;font-size:20px;">+ СОЗДАТЬ КОМНАТУ</button>

  }

  // СПИСОК ОТКРЫТЫХ КОМНАТ
  const openRooms=rooms.filter(r=>r.status==='waiting'&&r.players.length<r.mode&&(!STATE.currentRoom||r.id!==STATE.currentRoom));
  html+=`<div style="margin-bottom:16px;">
    <div class="section-label" style="margin-bottom:10px;">ОТКРЫТЫЕ КОМНАТЫ (${openRooms.length})</div>`;
  if(!openRooms.length){
    html+=`<div style="text-align:center;color:#4b5563;font-size:12px;padding:24px;border:1px dashed rgba(255,255,255,0.06);border-radius:14px;">

    openRooms.forEach(room=>{
      html+=`<div class="room-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">

            <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#4b5563;">ID: ${room.id}</div>
            <div style="font-weight:700;font-size:14px;margin-top:2px;">${room.mode}v${room.mode} · ${room.players.length}/${room.mode}</div>
          </div>
          ${!STATE.currentRoom?`<button onclick="joinRoom('${room.id}')" class="btn-flame font-display" style="padding:8px 18px;border-radius:10px;font-size:14px;">ВОЙТИ</button>`:''}

        <div style="display:flex;gap:6px;">
          ${Array.from({length:room.mode}).map((_,i)=>{
            const p=room.players[i];
            if(p) return `<div class="slot-filled" title="${p.name}">${avatarHtml(p,40,10)}</div>`;
            return `<div class="slot-empty">+</div>`;
          }).join('')}
        </div>
        ${room.players.length>0?`<div style="font-size:10px;color:#4b5563;margin-top:8px;">Лидер: ${room.players[0].name} · ELO ${room.players[0].elo}</div>`:''}
      </div>`;
    });
  }
  html+=`</div>`;

  // ЛОББИ ЧАТ
  html+=`<div>
    <div class="section-label" style="margin-bottom:10px;">💬 ЧАТ ЛОББИ</div>
    <div class="lobby-chat-wrap">
      <div class="lobby-chat-msgs" id="lobby-chat-msgs"></div>
      <div class="chat-input-wrap">
        <input class="chat-input" id="lobby-chat-input" placeholder="Написать в лобби..." onkeydown="if(event.key==='Enter')sendLobbyChatMsg()">
        <button class="chat-send-btn" onclick="sendLobbyChatMsg()">➤</button>
      </div>
    </div>
  </div>`;

  html+=`</div>`;
  return html;
}

// ============================================================
// TOP 100 — РЕАЛЬНЫЕ ДАННЫЕ ИЗ GLOBAL USERS
// ============================================================
function renderTop100(){
  syncRegisteredUsers();
  // Включаем себя в список
  const allUsers=[...STATE.registeredUsers,{
    id:STATE.user.id,name:STATE.user.name,emoji:STATE.user.emoji,
    elo:STATE.user.elo,wins:STATE.user.wins||0,losses:STATE.user.losses||0,
    isPrime:STATE.user.isPrime,verified:STATE.user.verified,avatar:STATE.user.avatar||null,
    status:'online'
  }];
  // Убираем дубли
  const seen=new Set();
  const unique=allUsers.filter(u=>{if(seen.has(u.id))return false;seen.add(u.id);return true;});
  // Сортируем по ELO
  const sorted=[...unique].sort((a,b)=>(b.elo||0)-(a.elo||0)).slice(0,100);
  const myRank=sorted.findIndex(u=>u.id===STATE.user.id)+1;

  const rankColors=['#f59e0b','#9ca3af','#f97316','#a78bfa'];
  const rankEmojis=['🥇','🥈','🥉'];

  return `<div class="page">
    <div class="font-display" style="font-size:32px;letter-spacing:3px;margin-bottom:6px;">ТОП 100</div>
    <div style="font-size:12px;color:#4b5563;margin-bottom:6px;">${sorted.length} игроков в рейтинге</div>
    ${myRank>0?`<div style="font-size:12px;color:var(--flame);font-weight:700;margin-bottom:16px;">Ваше место: #${myRank}</div>`:'<div style="margin-bottom:16px;"></div>'}

    ${sorted.length===0?`<div style="text-align:center;padding:40px;color:#4b5563;">
      <div style="font-size:48px;margin-bottom:12px;">🏆</div>
      <div style="font-size:14px;font-weight:700;margin-bottom:4px;">Рейтинг пуст</div>
      <div style="font-size:12px;">Станьте первым! Зайди с другой вкладки чтобы увидеть других.</div>
    </div>`:`<div style="display:flex;flex-direction:column;gap:0;">
      ${sorted.map((u,i)=>{
        const rank=i+1;
        const isMe=u.id===STATE.user.id;
        const rankColor=rank<=3?rankColors[rank-1]:rank<=10?rankColors[3]:'#4b5563';
        const wr=u.wins+u.losses>0?Math.round(u.wins/(u.wins+u.losses)*100):0;
        return `<div class="top-row ${isMe?'card-flame':''}" style="${isMe?'border-color:rgba(255,69,0,0.4);background:rgba(255,69,0,0.06);':''}">
          <div class="top-rank" style="color:${rankColor};">${rank<=3?rankEmojis[rank-1]:rank}</div>
          <div style="width:36px;height:36px;border-radius:9px;overflow:hidden;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;flex-shrink:0;">${avatarHtml(u,36,9)}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${u.name} ${u.isPrime?'<span class="badge-prime">PRIME</span>':''} ${u.verified?'<span style="color:#10b981;">✅</span>':''} ${isMe?'<span style="color:var(--flame);font-size:10px;">← ВЫ</span>':''}</div>
            <div style="font-size:10px;color:#4b5563;">${u.id} · W${u.wins||0}/L${u.losses||0} · ${wr}%</div>
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <div class="font-display" style="font-size:18px;color:${getRankColor(u.elo)};">${u.elo||0}</div>
            <div style="font-size:9px;color:#4b5563;letter-spacing:1px;">ELO</div>
          </div>
        </div>`;
      }).join('')}
    </div>`}
  </div>`;
}

function getRankColor(elo){
  if(elo>=2000)return '#f59e0b';
  if(elo>=1600)return '#60a5fa';
  if(elo>=1400)return '#a78bfa';
  if(elo>=1200)return '#fbbf24';
  if(elo>=1000)return '#9ca3af';
  return '#f97316';
}

// ============================================================
// ELO PAGE
// ============================================================
function getrank(elo){
  if(elo>=2000)return{name:'МАСТЕР',color:'#f59e0b',emoji:'👑'};
  if(elo>=1600)return{name:'БРИЛЛИАНТ',color:'#60a5fa',emoji:'💎'};
  if(elo>=1400)return{name:'ПЛАТИНА',color:'#a78bfa',emoji:'🔮'};
  if(elo>=1200)return{name:'ЗОЛОТО',color:'#fbbf24',emoji:'🥇'};
  if(elo>=1000)return{name:'СЕРЕБРО',color:'#9ca3af',emoji:'🥈'};
  return{name:'БРОНЗА',color:'#f97316',emoji:'🥉'};
}

function renderElo(){
  const u=STATE.user;
  const winRate=u.wins+u.losses>0?Math.round(u.wins/(u.wins+u.losses)*100):0;
  const rank=getrank(u.elo);
  syncRegisteredUsers();
  const allUsers=[...STATE.registeredUsers,u].sort((a,b)=>(b.elo||0)-(a.elo||0));
  const myRank=allUsers.findIndex(x=>x.id===u.id)+1;

  return `<div class="page">
    <div class="font-display" style="font-size:32px;letter-spacing:3px;margin-bottom:6px;">ELO РЕЙТИНГ</div>
    <div style="font-size:12px;color:#4b5563;margin-bottom:20px;">Твой текущий рейтинг</div>
    <div style="background:linear-gradient(135deg,rgba(255,69,0,0.12),rgba(139,92,246,0.08));border:1px solid var(--border-flame);border-radius:20px;padding:24px;margin-bottom:16px;text-align:center;">
      <div style="font-size:48px;margin-bottom:8px;">${rank.emoji}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:4px;color:${rank.color};margin-bottom:6px;">${rank.name}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:64px;line-height:1;color:#fff;margin-bottom:4px;">${u.elo}</div>
      <div style="font-size:11px;color:#4b5563;font-weight:700;letter-spacing:2px;">ELO ОЧКОВ</div>
      ${myRank>0?`<div style="font-size:13px;color:var(--flame);font-weight:700;margin-top:8px;">🏆 #${myRank} место в рейтинге</div>`:''}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;">
      <div class="stat-card"><div class="stat-value" style="color:var(--green);">${u.wins}</div><div class="stat-label">ПОБЕДЫ</div></div>
      <div class="stat-card"><div class="stat-value" style="color:#ef4444;">${u.losses}</div><div class="stat-label">ПОРАЖ.</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--flame);">${winRate}%</div><div class="stat-label">ВИНРЕЙТ</div></div>
    </div>
    <div style="background:rgba(0,136,204,0.08);border:1px solid rgba(0,136,204,0.3);border-radius:20px;padding:20px;margin-bottom:16px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
        <div style="width:44px;height:44px;background:linear-gradient(135deg,#0088cc,#00b4d8);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">✈️</div>
        <div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#38bdf8;">ПРОВЕРКА ELO ЧЕРЕЗ БОТА</div>
          <div style="font-size:11px;color:#4b5563;">@FlamelyElobot — официальный бот FLAMELY</div>
        </div>
      </div>
      <a href="https://t.me/FlamelyElobot" target="_blank" style="display:block;text-align:center;padding:13px;background:linear-gradient(135deg,#0088cc,#00b4d8);border-radius:12px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;text-decoration:none;">ОТКРЫТЬ БОТА ✈️</a>
    </div>
  </div>`;
}

// ============================================================
// SUPPORT PAGE
// ============================================================
function renderSupport(){
  const topics=[
    {emoji:'⚠️',title:'Репорт игрока',desc:'Пожаловаться на читера'},
    {emoji:'💎',title:'Вопрос по Prime',desc:'Подписка, оплата, активация'},
    {emoji:'🔑',title:'Проблема с аккаунтом',desc:'Вход, безопасность'},
    {emoji:'⚙️',title:'Технические проблемы',desc:'Баги, ошибки, лаги'},
    {emoji:'📊',title:'Ошибка в рейтинге',desc:'Неверный ELO или статистика'},
    {emoji:'💬',title:'Другое',desc:'Любой другой вопрос'},
  ];
  return `<div class="page">
    <div class="font-display" style="font-size:32px;letter-spacing:3px;margin-bottom:6px;">ПОДДЕРЖКА</div>
    <div style="font-size:12px;color:#4b5563;margin-bottom:20px;">Выберите тему обращения</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px;">
      ${topics.map(t=>`
        <div onclick="openSupportTicket('${t.title}')" style="display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--card2);border:1px solid var(--border);border-radius:14px;cursor:pointer;transition:border-color 0.2s;" onmouseover="this.style.borderColor='rgba(16,185,129,0.3)'" onmouseout="this.style.borderColor='var(--border)'">
          <div style="font-size:28px;">${t.emoji}</div>
          <div style="flex:1;"><div style="font-weight:700;font-size:13px;">${t.title}</div><div style="font-size:11px;color:#4b5563;">${t.desc}</div></div>
          <div style="color:#4b5563;font-size:16px;">›</div>
        </div>`).join('')}
    </div>
    ${STATE.supportTickets.length>0?`
    <div>
      <div class="section-label" style="margin-bottom:10px;">МОИ ОБРАЩЕНИЯ</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${STATE.supportTickets.map((t,i)=>`
          <div onclick="openTicketModal(${i})" style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card2);border:1px solid var(--border);border-radius:12px;cursor:pointer;">
            <div style="flex:1;"><div style="font-weight:700;font-size:12px;">#TKT-${(i+1).toString().padStart(3,'0')} · ${t.topic}</div><div style="font-size:10px;color:#4b5563;margin-top:2px;">${t.messages.length} сообщений</div></div>
            <span class="${t.closed?'report-closed':'report-open'}">${t.closed?'ЗАКРЫТ':'ОТКРЫТ'}</span>
          </div>`).join('')}
      </div>
    </div>`:''}
  </div>`;
}

// ============================================================
// PROFILE PAGE — исправленные аватарки
// ============================================================

      <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;">
        <!-- АВАТАР — всегда object-fit:cover -->
        <div onclick="uploadAvatar()" class="av-lg" style="width:80px;height:80px;" title="Нажми чтобы сменить фото">
          ${u.avatar
            ?`<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;object-position:center;display:block;border-radius:18px;">`
            :`<span style="font-size:36px;">${u.emoji}</span>`}
          <div style="position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;border-radius:18px;transition:background 0.2s;" onmouseover="this.style.background='rgba(0,0,0,0.55)'" onmouseout="this.style.background='rgba(0,0,0,0)'">
            <span style="font-size:22px;opacity:0.8;">📷</span>
          </div>
        </div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">
            <div class="font-display" style="font-size:22px;letter-spacing:1px;">${u.name}</div>
            ${u.isPrime?'<span class="badge-prime">PRIME</span>':'<span class="badge-free">FREE</span>'}
            ${u.verified?'<span style="background:linear-gradient(135deg,#059669,#10b981);color:#fff;font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;">✅</span>':''}
          </div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#4b5563;margin-bottom:4px;">${u.id}</div>
          <div style="font-size:12px;color:${rank.color};font-weight:700;">${rank.emoji} ${rank.name} · ${u.elo} ELO</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button onclick="openEditNick()" style="flex:1;padding:10px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;color:#e5e7eb;font-size:12px;font-weight:700;cursor:pointer;" onmouseover="this.style.borderColor='rgba(255,69,0,0.4)'" onmouseout="this.style.borderColor='var(--border)'">✏️ Сменить ник</button>
        <button onclick="uploadAvatar()" style="flex:1;padding:10px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;color:#e5e7eb;font-size:12px;font-weight:700;cursor:pointer;" onmouseover="this.style.borderColor='rgba(255,69,0,0.4)'" onmouseout="this.style.borderColor='var(--border)'">📷 Сменить фото</button>
        ${u.avatar?`<button onclick="removeAvatar()" style="padding:10px 14px;background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);border-radius:12px;color:#ef4444;font-size:12px;font-weight:700;cursor:pointer;">🗑️</button>`:''}
      </div>
    </div>

    <div id="edit-nick-panel" style="display:none;background:rgba(255,69,0,0.07);border:1px solid rgba(255,69,0,0.25);border-radius:14px;padding:16px;margin-bottom:16px;">
      <div class="section-label" style="margin-bottom:10px;color:var(--flame);">✏️ НОВЫЙ НИК</div>
      <input id="new-nick-input" class="input-field" placeholder="Введите новый ник..." maxlength="20" style="margin-bottom:10px;" value="${u.name}">
      <div style="display:flex;gap:8px;">
        <button onclick="saveNick()" class="btn-flame font-display" style="flex:1;padding:10px;border-radius:10px;font-size:15px;">СОХРАНИТЬ</button>
        <button onclick="document.getElementById('edit-nick-panel').style.display='none'" class="btn-ghost font-display" style="padding:10px 16px;border-radius:10px;font-size:15px;">ОТМЕНА</button>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;">
      <div class="stat-card"><div class="stat-value" style="color:var(--green);">${u.wins}</div><div class="stat-label">WIN</div></div>
      <div class="stat-card"><div class="stat-value" style="color:#ef4444;">${u.losses}</div><div class="stat-label">LOSE</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--flame);">${u.kd}</div><div class="stat-label">K/D</div></div>
    </div>

    <div style="display:flex;flex-direction:column;gap:10px;">
      <div class="section-label">НАСТРОЙКИ</div>
      <div style="background:var(--card2);border:1px solid var(--border);border-radius:14px;overflow:hidden;">
        <div onclick="requestPushPermission()" style="padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-bottom:1px solid var(--border);">
          <span style="font-size:13px;font-weight:600;">🔔 Уведомления</span>
          <span style="font-size:11px;color:${STATE.pushEnabled?'var(--green)':'#4b5563'};font-weight:700;">${STATE.pushEnabled?'ВКЛ':'ВЫКЛ'}</span>
        </div>
        <div onclick="openTab('support')" style="padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-bottom:1px solid var(--border);">
          <span style="font-size:13px;font-weight:600;">💬 Поддержка</span><span style="color:#4b5563;">›</span>
        </div>
        <div onclick="openTab('top')" style="padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;">
          <span style="font-size:13px;font-weight:600;">🏆 Топ 100</span><span style="color:#4b5563;">›</span>
        </div>
      </div>
      <button onclick="logoutConfirm()" style="padding:12px;background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);border-radius:12px;color:#ef4444;font-size:13px;font-weight:700;cursor:pointer;">🚪 Выйти из аккаунта</button>
    </div>
  </div>`;
}

function logoutConfirm(){
  showConfirm('Выйти из аккаунта?', ()=>{
    // Ставим оффлайн перед выходом
    if(STATE.user.id){
      const list=getGlobalUsers();
      const u=list.find(x=>x.id===STATE.user.id);
      if(u){u.status='offline';u.lastSeen=0;}
      saveGlobalUsers(list);
    }
    STATE.isLogged=false;
    saveData();
    toast('👋 До свидания!');
    setTimeout(()=>location.reload(),800);
  });
}

function openEditNick(){
  const panel=document.getElementById('edit-nick-panel');
  if(panel){panel.style.display='block';const inp=document.getElementById('new-nick-input');if(inp){inp.value=STATE.user.name;inp.focus();inp.select();}}
}

function saveNick(){
  const inp=document.getElementById('new-nick-input');
  if(!inp)return;
  const val=inp.value.trim();
  if(!val||val.length<2){toast('❌ Ник слишком короткий');return;}
  if(val.length>20){toast('❌ Ник слишком длинный');return;}
  STATE.user.name=val;
  saveData();registerCurrentUser();toast('✅ Ник изменён');renderPage();
}

// ============================================================
// STORAGE
// ============================================================
function saveData(){
  try{
    const toSave={
      user:STATE.user,
      friends:STATE.friends,
      sentRequests:STATE.sentRequests,
      declinedRequests:STATE.declinedRequests||[],
      reports:STATE.reports,
      supportTickets:STATE.supportTickets,
      bannedUsers:STATE.bannedUsers,
      isLogged:STATE.isLogged,
      pushEnabled:STATE.pushEnabled,
      currentRoom:STATE.currentRoom,
      lobbyMode:STATE.lobbyMode,
    };
    localStorage.setItem('flamely_ext',JSON.stringify(toSave));
  }catch(e){console.warn('saveData error',e);}
}

function loadData(){
  try{
    const raw=localStorage.getItem('flamely_ext');
    if(!raw)return;
    const data=JSON.parse(raw);
    if(data.user) Object.assign(STATE.user,data.user);
    if(data.friends)       STATE.friends=data.friends;
    if(data.sentRequests)  STATE.sentRequests=data.sentRequests;
    if(data.declinedRequests) STATE.declinedRequests=data.declinedRequests;
    if(data.reports)       STATE.reports=data.reports;
    if(data.supportTickets) STATE.supportTickets=data.supportTickets;
    if(data.bannedUsers)   STATE.bannedUsers=data.bannedUsers;
    if(typeof data.isLogged!=='undefined') STATE.isLogged=data.isLogged;
    if(typeof data.pushEnabled!=='undefined') STATE.pushEnabled=data.pushEnabled;
    if(data.currentRoom)   STATE.currentRoom=data.currentRoom;
    if(data.lobbyMode)     STATE.lobbyMode=data.lobbyMode;
  }catch(e){console.warn('loadData error',e);}
}

// ============================================================
// AVATAR — исправлено: только object-fit:cover
// ============================================================
function uploadAvatar(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='image/*';
  input.onchange=e=>{
    const file=e.target.files[0];
    if(!file)return;
    if(file.size>5*1024*1024){toast('❌ Файл слишком большой (макс. 5 МБ)');return;}
    const reader=new FileReader();
    reader.onload=ev=>{
      STATE.user.avatar=ev.target.result;
      saveData();registerCurrentUser();updateNavAvatar();
      toast('✅ Фото обновлено!');
      if(STATE.currentTab==='profile') renderPage();
    };
    reader.onerror=()=>toast('❌ Ошибка чтения файла');
    reader.readAsDataURL(file);
  };
  document.body.appendChild(input);
  input.click();
  setTimeout(()=>document.body.removeChild(input),1000);
}

function removeAvatar(){
  STATE.user.avatar=null;
  updateNavAvatar();saveData();registerCurrentUser();
  toast('🗑️ Фото удалено');
  renderPage();
}

// ============================================================
// ADMIN EXTRA
// ============================================================
function adminGiveElo(){adminGiveEloById();}
function adminChangeNick(){
  const id=prompt('ID игрока');const val=prompt('Новый ник');
  if(!id||!val)return;
  if(id===STATE.user.id){STATE.user.name=val;}
  else{const list=getGlobalUsers();const u=list.find(x=>x.id===id);if(u){u.name=val;saveGlobalUsers(list);}}
  saveData();toast('Ник изменен');renderPage();
}

// ============================================================
// INIT
// ============================================================
loadData();
updateFriendsBadge();

function showRegistration(){
  // Показываем красивый экран регистрации
  const content=document.getElementById('app-content');
  content.innerHTML=`<div class="page" style="min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
    <div style="font-size:64px;margin-bottom:16px;">🔥</div>
    <div class="font-display" style="font-size:40px;letter-spacing:4px;margin-bottom:4px;">FLAMELY</div>
    <div style="font-size:13px;color:#4b5563;margin-bottom:32px;">ПРО ЛИГА · ОНЛАЙН</div>
    <div style="width:100%;max-width:320px;">
      <div class="section-label" style="margin-bottom:10px;text-align:left;">ТВОЙ НИК</div>
      <input id="reg-nick" class="input-field" placeholder="Введи свой ник..." maxlength="20" style="margin-bottom:12px;font-size:16px;text-align:center;" onkeydown="if(event.key==='Enter')doRegister()">
      <button onclick="doRegister()" class="btn-flame font-display" style="width:100%;padding:16px;border-radius:14px;font-size:22px;">ВОЙТИ</button>
    </div>
  </div>`;
  setTimeout(()=>{const inp=document.getElementById('reg-nick');if(inp)inp.focus();},100);
}

function doRegister(){
  const inp=document.getElementById('reg-nick');
  if(!inp)return;
  const name=inp.value.trim();
  if(!name||name.length<2){toast('❌ Ник слишком короткий (мин. 2 символа)');return;}
  if(name.length>20){toast('❌ Ник слишком длинный');return;}
  STATE.user.name=name;
  STATE.user.id=generateUniqueId();
  STATE.isLogged=true;
  saveData();
  registerCurrentUser();
  toast(`✅ Добро пожаловать, ${STATE.user.name}! ID: ${STATE.user.id}`);
  renderPage();
}

if(!STATE.isLogged){
  showRegistration();
} else {
  // Проверяем что ID существует и уникален
  if(!STATE.user.id||STATE.user.id==='#F001'){
    // Генерируем новый уникальный ID
    STATE.user.id=generateUniqueId();
    saveData();
  }
  registerCurrentUser();
  renderPage();
}

// Логаут двойным кликом на профиль
setTimeout(()=>{
  const profileBtn=document.querySelector('#tab-profile');
  if(profileBtn){
    profileBtn.addEventListener('dblclick',()=>{
      logoutConfirm();
    });
  }
},500);

// F2 quick admin
document.addEventListener('keydown',(e)=>{
  if(e.key==='F2'){
    const act=prompt('1=ELO 2=НИК 3=АВАТАР');
    if(act==='1') adminGiveEloById();
    if(act==='2') adminChangeNick();
    if(act==='3') uploadAvatar();
  }
});

// Auto save + sync + lobby poll
setInterval(()=>{
  if(!STATE.isLogged)return;
  saveData();
  registerCurrentUser();
  updateFriendsBadge();
  updateOnlineCount();
  if(STATE.currentTab==='lobby') pollLobbyChat();
  // Обновляем комнаты в реальном времени
  if(STATE.currentTab==='lobby' && STATE.currentRoom){
    cleanOldRooms();
    const rooms=getRooms();
    const room=rooms.find(r=>r.id===STATE.currentRoom);
    if(!room){STATE.currentRoom=null;saveData();renderPage();}
  }
},3000);

// Чистим старые комнаты
setInterval(cleanOldRooms,60000);
</script>
